<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doly.fun 🎀</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* ==========  🎨 THEMES  ========== */
        body.theme-bubblegum {
            --primary: #ff85a2;
            --primary-soft: #ffd1dc;
            --secondary: #a3d8f4;
            --secondary-soft: #eef9ff;
            --accent: #ffd166;
            --text: #4a4a4a;
            --text-soft: #8e8e9a;
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: #ffffff;
            --surface: #fffbfd;
            --surface-border: #f2e6ec;
            --bg-gradient: linear-gradient(-45deg, #ffe6f2, #fff0f5, #e6e6fa, #ffe6f2);
            --shadow: rgba(255, 133, 162, 0.2);
        }
        body.theme-lavender {
            --primary: #b19cd9;
            --primary-soft: #e0d4f7;
            --secondary: #ffb6d9;
            --secondary-soft: #fff0f7;
            --accent: #ffd166;
            --text: #4a4a5a;
            --text-soft: #8a7ea0;
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: #ffffff;
            --surface: #fbf8ff;
            --surface-border: #ebe4f5;
            --bg-gradient: linear-gradient(-45deg, #e8dffc, #f5ecff, #ffe6f5, #e8dffc);
            --shadow: rgba(177, 156, 217, 0.25);
        }
        body.theme-peach {
            --primary: #ff9e7d;
            --primary-soft: #ffd9c9;
            --secondary: #ffcf99;
            --secondary-soft: #fff4e6;
            --accent: #ff85a2;
            --text: #5a4a4a;
            --text-soft: #9a7a66;
            --card-bg: rgba(255, 252, 248, 0.96);
            --card-border: #fff6ef;
            --surface: #fff7ef;
            --surface-border: #f5e4d0;
            --bg-gradient: linear-gradient(-45deg, #ffe8db, #fff4e6, #ffecd1, #ffe0c2);
            --shadow: rgba(255, 158, 125, 0.22);
        }
        body.theme-mint {
            --primary: #7bcfb0;
            --primary-soft: #cfeee0;
            --secondary: #ffb6d9;
            --secondary-soft: #fff0f7;
            --accent: #ffd166;
            --text: #3f5a4d;
            --text-soft: #6a8a7e;
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: #ffffff;
            --surface: #f5fbf8;
            --surface-border: #dcf0e6;
            --bg-gradient: linear-gradient(-45deg, #d9f3e5, #e8fcf0, #ffe6f2, #d9f3e5);
            --shadow: rgba(123, 207, 176, 0.22);
        }
        body.theme-night {
            --primary: #ff8cc8;
            --primary-soft: #5a3f6f;
            --secondary: #a894e8;
            --secondary-soft: #3d2f55;
            --accent: #ffd166;
            --text: #f0e4f5;
            --text-soft: #c9b8d4;
            --card-bg: rgba(50, 40, 68, 0.92);
            --card-border: rgba(255, 140, 200, 0.3);
            --surface: rgba(70, 55, 90, 0.55);
            --surface-border: rgba(255, 140, 200, 0.18);
            --bg-gradient: linear-gradient(-45deg, #2a1f3d, #3d2a4d, #4a2f55, #2a1f3d);
            --shadow: rgba(0, 0, 0, 0.35);
        }

        /* ==========  ✨ ANIMATIONS  ========== */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5) rotate(15deg); opacity: 0; }
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        @keyframes petalFall {
            0%   { transform: translateY(-8vh) translateX(0) rotate(0deg); opacity: 0; }
            8%   { opacity: 0.75; }
            92%  { opacity: 0.75; }
            100% { transform: translateY(108vh) translateX(40px) rotate(360deg); opacity: 0; }
        }
        .ambient-petal {
            position: fixed; top: 0; left: 0;
            pointer-events: none;
            z-index: 1;
            animation: petalFall linear forwards;
            will-change: transform, opacity;
        }

        .shake-hint {
            display: none;
            font-size: 0.8rem;
            color: var(--text-soft);
            margin-top: 10px;
            font-weight: 500;
        }
        @media (hover: none) and (pointer: coarse) {
            .shake-hint { display: block; }
        }

        /* ==========  🌸 BASE  ========== */
        * { box-sizing: border-box; }
        button, a, .btn, .food-pill, .theme-swatch, #heart-button, #theme-toggle {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text);
            font-family: 'Fredoka', 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            font-weight: 500;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        .container { max-width: 500px; width: 100%; display: flex; flex-direction: column; gap: 15px; position: relative; z-index: 2; }

        .card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 var(--shadow);
            border: 2px solid var(--card-border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: transform 0.2s, background 0.3s, border-color 0.3s;
            animation: fadeInUp 0.5s ease backwards;
        }
        .card:hover { transform: translateY(-2px); }

        h1 { font-family: 'Fredoka', sans-serif; font-weight: 700; }
        h2 { margin-top: 0; color: var(--primary); font-size: 1.3rem; margin-bottom: 10px; font-weight: 600; }

        /* ==========  💅 BUTTONS  ========== */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 15px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 0 var(--shadow);
            text-decoration: none;
            display: inline-block;
            text-align: center;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:hover { animation: wiggle 0.3s ease-in-out infinite; }
        .btn:active { transform: scale(0.95) translateY(2px) !important; box-shadow: 0 2px 0 var(--shadow); animation: none; }

        /* ==========  💖 FLOATING EMOJI / HEART BUTTON  ========== */
        #emoji-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
        .floating-emoji { position: absolute; font-size: 2rem; animation: floatUp 2s ease-out forwards; }

        #heart-button {
            position: fixed; bottom: 20px; right: 20px; z-index: 900;
            width: 54px; height: 54px; border-radius: 50%;
            background: var(--primary); color: white; border: 3px solid white;
            font-size: 1.5rem; cursor: pointer;
            box-shadow: 0 6px 20px var(--shadow);
            transition: transform 0.2s;
            animation: pulseHeart 2s ease-in-out infinite;
            display: flex; align-items: center; justify-content: center;
        }
        #heart-button:hover { transform: scale(1.1); }
        #heart-button:active { transform: scale(0.9); }

        /* ==========  🎨 THEME PICKER  ========== */
        #theme-picker {
            position: fixed; top: 15px; right: 15px; z-index: 1000;
            display: flex; align-items: center; gap: 8px; flex-direction: row-reverse;
        }
        #theme-toggle {
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px solid white;
            background: var(--card-bg); font-size: 1.2rem; cursor: pointer;
            box-shadow: 0 4px 12px var(--shadow);
            transition: transform 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        #theme-toggle:hover { transform: rotate(-20deg) scale(1.08); }
        #theme-panel {
            display: flex; gap: 6px; padding: 7px 10px;
            background: var(--card-bg);
            border-radius: 30px; box-shadow: 0 4px 12px var(--shadow);
            border: 2px solid var(--card-border);
            transform: scale(0) translateX(20px);
            transform-origin: right center;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #theme-panel.open { transform: scale(1) translateX(0); }
        .theme-swatch {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid white; cursor: pointer; padding: 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            transition: transform 0.15s, border-color 0.15s;
        }
        .theme-swatch:hover { transform: scale(1.18); }
        .theme-swatch.active { border-color: var(--primary); transform: scale(1.12); box-shadow: 0 0 0 2px var(--primary-soft), 0 2px 6px rgba(0,0,0,0.15); }

        /* ==========  💖 HEADER  ========== */
        .header-card { text-align: center; position: relative; overflow: hidden; }
        .header-card::before {
            content: '✨'; position: absolute; top: 10px; left: 15px;
            font-size: 1.2rem; animation: sparkle 2.5s ease-in-out infinite;
        }
        .header-card::after {
            content: '🌸'; position: absolute; bottom: 10px; right: 15px;
            font-size: 1.2rem; animation: sparkle 2.5s ease-in-out infinite 0.8s;
        }
        #greeting { margin: 0; font-size: 2rem; font-weight: 700; line-height: 1.2; }
        #ace-status {
            margin: 6px 0 0 0; font-size: 0.95rem; color: var(--primary);
            font-weight: 600; font-family: 'Caveat', cursive; font-size: 1.25rem;
            transition: opacity 0.4s;
            min-height: 1.5rem;
        }

        /* ==========  📝 INPUTS  ========== */
        input, select, textarea {
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px;
            border: 2px solid var(--surface-border);
            background: var(--surface);
            color: var(--text);
            font-family: inherit; font-size: 0.95rem;
            box-sizing: border-box; resize: vertical;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; }
        label { color: var(--text); }

        /* ==========  🛍️ WISHLIST  ========== */
        .wishlist-item {
            display: flex; align-items: center;
            background: var(--surface); padding: 12px; border-radius: 14px; margin-bottom: 8px;
            border: 1px solid var(--surface-border);
            animation: fadeInUp 0.3s ease;
        }
        .rank-num {
            background: var(--primary); color: white; width: 26px; height: 26px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 700; margin-right: 10px; flex-shrink: 0;
        }
        .wishlist-add-box { display: flex; gap: 6px; margin-top: 10px; }
        .wishlist-add-box input { margin-bottom: 0; }
        .wishlist-add-box button { margin-top: 0; width: auto; padding: 0 20px; }

        .completed-list {
            max-height: 260px; overflow-y: auto;
            border-radius: 12px; padding-right: 5px; margin-top: 10px;
        }
        .completed-list::-webkit-scrollbar { width: 6px; }
        .completed-list::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; }
        .completed-item {
            opacity: 0.65; text-decoration: line-through;
            background: var(--surface); border: 1px dashed var(--surface-border);
        }
        .completed-header {
            font-size: 1.1rem; color: var(--text-soft);
            text-align: left; margin: 15px 0 5px 0; font-weight: 600;
        }

        /* ==========  ✨ ROUTINE  ========== */
        .routine-list { display: flex; flex-direction: column; gap: 8px; }
        .routine-item {
            background: var(--surface); padding: 10px 15px; border-radius: 14px;
            border: 1px solid var(--surface-border);
            display: flex; align-items: center; gap: 10px; font-weight: 500;
            color: var(--text);
        }
        .routine-emoji { font-size: 1.4rem; min-width: 30px; text-align: center; }

        /* ==========  💧 STANLEY  ========== */
        .stanley-card {
            background: var(--secondary-soft) !important;
            border-color: var(--secondary) !important;
        }
        .stanley-container { display: flex; align-items: center; justify-content: space-between; }
        .stanley-card h2 { color: var(--secondary) !important; filter: brightness(0.75); }
        .stanley-img { width: 80px; height: auto; transform: rotate(-10deg); }
        .counter-box { font-size: 3rem; font-weight: 900; color: var(--secondary); text-shadow: 2px 2px 0 var(--card-bg); line-height: 1; }
        .btn-secondary { background: var(--secondary) !important; }

        /* ==========  🍽️ FOOD  ========== */
        .food-card { text-align: center; }
        .food-pills {
            display: flex; gap: 4px;
            background: var(--surface); padding: 5px;
            border-radius: 20px; margin-bottom: 15px;
            border: 1px solid var(--surface-border);
        }
        .food-pill {
            flex: 1; border: none; background: transparent; border-radius: 16px;
            padding: 10px 4px; font-family: inherit; font-weight: 600;
            font-size: 0.88rem; color: var(--text-soft); cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            transition: all 0.25s ease;
        }
        .food-pill .pill-emoji { font-size: 1.35rem; filter: grayscale(50%); transition: filter 0.25s; }
        .food-pill.active {
            background: var(--primary); color: white;
            box-shadow: 0 4px 14px var(--shadow);
            transform: translateY(-1px);
        }
        .food-pill.active .pill-emoji { filter: grayscale(0); transform: scale(1.05); }

        .food-plate {
            background: var(--surface);
            border: 2px dashed var(--primary);
            border-radius: 24px; padding: 22px 16px;
            min-height: 130px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 10px;
            transition: all 0.3s;
        }
        .plate-emoji {
            font-size: 2.6rem;
            animation: popIn 0.4s ease;
        }
        #food-result {
            font-size: 1.05rem; font-weight: 600; color: var(--text);
            margin: 0;
        }
        #food-result b {
            color: var(--primary); font-family: 'Caveat', cursive;
            font-size: 1.8rem; font-weight: 700; display: block; margin-top: 4px;
        }
        .food-img-display {
            width: 100%; max-height: 220px; object-fit: cover;
            border-radius: 16px; margin-top: 6px; display: none;
            border: 2px solid var(--primary-soft);
        }
        .food-actions { display: flex; gap: 8px; margin-top: 14px; }
        .food-pick-btn { flex: 1; margin-top: 0 !important; }
        .food-order-btn {
            flex: 1; margin-top: 0 !important;
            background: var(--accent) !important;
            color: #5a4a2a !important;
        }

        /* ==========  📺 WATCH / 🎭 FUN / 🌸 MINI  ========== */
        .watch-btn {
            background-color: var(--surface) !important; color: var(--text) !important;
            border: 2px solid var(--surface-border) !important; text-align: left;
            padding-left: 15px; margin-bottom: 8px;
            box-shadow: 3px 3px 0 var(--surface-border) !important;
            font-weight: 600;
        }
        .mini-card {
            font-size: 0.95rem;
            background: var(--card-bg);
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; color: var(--text-soft);
        }
        .mini-card strong { color: var(--primary); }

        #meme-result { margin: 10px 0; min-height: 30px; color: var(--text); }
        #meme-result img { max-width: 100%; border-radius: 14px; }

        #loader {
            text-align: center; padding: 50px;
            font-weight: 600; color: var(--primary);
            background: var(--card-bg); border-radius: 20px;
            border: 2px solid var(--card-border);
        }

        #wish-success-msg { color: #2ed573; }
    </style>
</head>
<body class="theme-peach">

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {wishlistSubmitDone();}"></iframe>

    <div id="emoji-container"></div>

    <!-- 🎨 Theme Picker -->
    <div id="theme-picker">
        <button id="theme-toggle" onclick="toggleThemePanel()" aria-label="Change theme">🎨</button>
        <div id="theme-panel">
            <button class="theme-swatch" data-theme="bubblegum" onclick="setTheme('bubblegum')" title="Bubblegum" style="background: linear-gradient(135deg, #ff85a2, #a3d8f4);"></button>
            <button class="theme-swatch" data-theme="lavender" onclick="setTheme('lavender')" title="Lavender" style="background: linear-gradient(135deg, #b19cd9, #ffb6d9);"></button>
            <button class="theme-swatch" data-theme="peach" onclick="setTheme('peach')" title="Peach" style="background: linear-gradient(135deg, #ff9e7d, #ffd6a5);"></button>
            <button class="theme-swatch" data-theme="mint" onclick="setTheme('mint')" title="Mint" style="background: linear-gradient(135deg, #7bcfb0, #ffb6d9);"></button>
            <button class="theme-swatch" data-theme="night" onclick="setTheme('night')" title="Night" style="background: linear-gradient(135deg, #2a1f3d, #ff8cc8);"></button>
        </div>
    </div>

    <!-- 💖 Floating heart button -->
    <button id="heart-button" onclick="makeItRain('💖')" aria-label="Send hearts">💖</button>

    <div class="container">
        <div class="card header-card">
            <h1 id="greeting">Hello Doly! 🥹💖</h1>
            <p id="ace-status">ace loves you 💞</p>
        </div>

        <div id="loader">Loading... 💖</div>

        <div id="content" style="display: none; flex-direction: column; gap: 15px;">

            <div class="card">
                <h2>🛍️ Wishlist</h2>
                <div id="wishlist-container"></div>
                <form id="google-wish-form" action="" method="POST" target="hidden_iframe" class="wishlist-add-box" onsubmit="submitted=true;">
                    <input type="text" id="wish-entry" name="" placeholder="Add new item..." required />
                    <button class="btn" type="submit">Add</button>
                </form>
                <div id="wish-success-msg" style="display:none; text-align:center; font-weight:600; font-size:0.9rem; margin-top:5px;">Added! ✨</div>
            </div>

            <div class="card">
                <h2>✨ Bugün Yapılacaklar</h2>
                <div id="routine-list" class="routine-list"></div>
            </div>

            <div class="card stanley-card">
                <div class="stanley-container">
                    <div>
                        <h2 style="margin-bottom:0;">Stanley Sips</h2>
                        <div class="counter-box" id="water-count">0</div>
                    </div>
                    <img id="stanley-img-tag" src="" class="stanley-img" />
                </div>
                <button class="btn btn-secondary" onclick="addWater()">+ Drink Water 💧</button>
            </div>

            <div class="card">
                <h2>🫡 Ace'e Görev Ver</h2>
                <form id="taskForm" action="" method="POST">
                    <label style="font-size:0.9rem; font-weight:600;">Görev Tipi:</label>
                    <select id="task-type" name="TaskType" onchange="updatePlaceholder()">
                        <option value="Yemek Söyle">🍔 Yemek Söyle</option>
                        <option value="Limit Arttır">💸 Limit Arttır</option>
                        <option value="Para At">🤑 Para At OC</option>
                        <option value="Essay Yaz">📝 Essay Yaz</option>
                    </select>
                    <textarea id="task-details" name="Details" rows="3" placeholder="Detay yaz..."></textarea>
                    <button class="btn" type="submit">Gönder 🚀</button>
                </form>
            </div>

            <!-- 🍽️ FOOD -->
            <div class="card food-card">
                <h2>🍽️ Aç mısın?</h2>
                <div class="food-pills" role="tablist">
                    <button class="food-pill active" data-type="All" onclick="setFoodType('All')">
                        <span class="pill-emoji">🍽️</span><span>Hepsi</span>
                    </button>
                    <button class="food-pill" data-type="Healthy" onclick="setFoodType('Healthy')">
                        <span class="pill-emoji">🥗</span><span>Sağlıklı</span>
                    </button>
                    <button class="food-pill" data-type="Dirty" onclick="setFoodType('Dirty')">
                        <span class="pill-emoji">🍔</span><span>Pis</span>
                    </button>
                </div>
                <div class="food-plate">
                    <div class="plate-emoji" id="food-plate-emoji">🍴</div>
                    <p id="food-result">Ne yiyelim bugün?</p>
                    <img id="food-img-tag" class="food-img-display" src="" />
                </div>
                <div class="food-actions">
                    <button class="btn food-pick-btn" onclick="pickFood()">🎲 Pick Random</button>
                    <a id="food-link-btn" href="#" target="_blank" class="btn food-order-btn" style="display:none;">Sipariş ver 🛵</a>
                </div>
                <p class="shake-hint">📱 or shake to surprise</p>
            </div>

            <div class="card">
                <h2>💌 Ace'e Mesaj</h2>
                <form id="msgForm" action="" method="POST">
                    <textarea name="Message" rows="3" placeholder="ily"></textarea>
                    <button class="btn btn-secondary" type="submit" style="margin-top:5px;">Gönder 📨</button>
                </form>
            </div>

            <div class="card">
                <h2>📺 Watch List</h2>
                <div id="watchlist-container"></div>
            </div>

            <div class="card">
                <h2>🎭 Fun</h2>
                <div id="meme-result">Tap for fun</div>
                <button class="btn" onclick="pickMeme(); makeItRain('✨');" style="background: var(--accent); color: #5a4a2a;">✨ Surprise Me</button>
            </div>

            <div class="card mini-card">
                <span>🌸 Cycle Tracker</span>
                <span id="period-countdown">Loading...</span>
            </div>
        </div>
    </div>

    <script>
        // *** ⚙️ LINKS ***
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQuJsb75m10YnQtHuHKl-gNKKGfJNPh4OYr7SpSNuljJat5wdgHfUPjFA3CYHoPAfwk2f3rgHzBTTOD/pub?gid=0&single=true&output=csv";
        const formspreeURL = "https://formspree.io/f/mlggnvbn";
        const stanleyImage = "https://i.ibb.co/dJs3KJNn/image-removebg-preview-8.png";
        const googleFormURL = "https://docs.google.com/forms/d/e/1FAIpQLSf4MWX33nGvVVLIbxH7KNwPFBVLQ6C6svd_gdCIBvwexsxLXw/formResponse";
        const googleFormEntryID = "entry.546692272";

        // Configure Forms
        document.getElementById('taskForm').action = formspreeURL;
        document.getElementById('msgForm').action = formspreeURL;
        document.getElementById('stanley-img-tag').src = stanleyImage;
        const gForm = document.getElementById('google-wish-form');
        gForm.action = googleFormURL;
        document.getElementById('wish-entry').name = googleFormEntryID;

        // Variables
        let foods = []; let memes = []; let watchlist = []; let wishlist = []; let completedWishlist = []; let nextPeriodDate = "";
        let selectedFoodType = "All";
        var submitted = false;

        /* ==========  🎨 THEME PICKER  ========== */
        function toggleThemePanel() {
            document.getElementById('theme-panel').classList.toggle('open');
        }
        function setTheme(name) {
            document.body.className = 'theme-' + name;
            localStorage.setItem('dolyTheme', name);
            document.querySelectorAll('.theme-swatch').forEach(s => {
                s.classList.toggle('active', s.dataset.theme === name);
            });
        }
        (function initTheme() {
            const saved = localStorage.getItem('dolyTheme') || 'peach';
            setTheme(saved);
        })();
        // Close theme panel on outside click
        document.addEventListener('click', (e) => {
            const picker = document.getElementById('theme-picker');
            if (!picker.contains(e.target)) {
                document.getElementById('theme-panel').classList.remove('open');
            }
        });

        /* ==========  🌅 TIME-OF-DAY GREETING  ========== */
        function updateGreeting() {
            const hour = new Date().getHours();
            let text;
            if (hour < 5)       text = "Gece gece ne yapıyosun Doly 🌙✨";
            else if (hour < 12) text = "Good morning Doly ☀️💖";
            else if (hour < 17) text = "Hey Doly 🌸💞";
            else if (hour < 22) text = "İyi akşamlar Doly 🌆💕";
            else                text = "İyi geceler Doly 🌙💖";
            document.getElementById('greeting').innerHTML = text;
        }

        /* ==========  💭 ROTATING ACE STATUS  ========== */
        // Fallback — overridden by Google Sheet column J (Ace_Status) if present
        let aceStatuses = ["ace loves you 💞"];
        let aceIdx = 0;
        function rotateAce() {
            const el = document.getElementById('ace-status');
            el.style.opacity = '0';
            setTimeout(() => {
                aceIdx = (aceIdx + 1) % aceStatuses.length;
                el.innerText = aceStatuses[aceIdx];
                el.style.opacity = '1';
            }, 400);
        }

        // --- CSV PARSER ---
        function parseCSV(text) {
            const rows = [];
            let currentRow = [];
            let currentVal = '';
            let insideQuote = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') { insideQuote = !insideQuote; }
                else if (char === ',' && !insideQuote) { currentRow.push(currentVal.trim()); currentVal = ''; }
                else if ((char === '\n' || char === '\r') && !insideQuote) {
                    if (currentVal || currentRow.length > 0) currentRow.push(currentVal.trim());
                    if (currentRow.length > 0) rows.push(currentRow);
                    currentRow = []; currentVal = '';
                } else { currentVal += char; }
            }
            if (currentRow.length > 0) rows.push(currentRow);
            return rows;
        }

        async function fetchData() {
            try {
                const response = await fetch(sheetURL);
                const data = await response.text();
                const rows = parseCSV(data);

                wishlist = [];
                completedWishlist = [];
                foods = [];
                const sheetAceStatuses = [];

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length < 2) continue;

                    if (row[0] && row[0] !== "Rest_Name") {
                        foods.push({ name: row[0], link: row[1] || "", img: row[2] || "", type: (row[3] || "Both").trim() });
                    }
                    if (row[4]) memes.push(row[4]);
                    if (row[5] && row[5].toLowerCase() !== "watch_title") {
                        watchlist.push({ title: row[5], link: row[6] || "#" });
                    }

                    if (i === 2 && row[7]) nextPeriodDate = row[7];

                    let wishItem = row[8];
                    if (wishItem && wishItem.length > 1 && wishItem.toLowerCase() !== "wishlist_item" && wishItem.toLowerCase() !== "item") {
                        if (wishItem.includes('✅')) {
                            completedWishlist.push(wishItem);
                        } else {
                            wishlist.push(wishItem);
                        }
                    }

                    const statusItem = row[9];
                    if (statusItem && statusItem.length > 1 && statusItem.toLowerCase() !== "ace_status" && statusItem.toLowerCase() !== "status") {
                        sheetAceStatuses.push(statusItem);
                    }
                }

                if (sheetAceStatuses.length > 0) {
                    aceStatuses = sheetAceStatuses;
                    aceIdx = 0;
                    document.getElementById('ace-status').innerText = aceStatuses[0];
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('content').style.display = 'flex';
                updatePeriodCountdown(); renderWatchlist(); renderWishlist(); renderRoutine();
            } catch (error) {
                console.error(error);
                document.getElementById('loader').innerText = "Error loading data.";
            }
        }

        function renderWishlist() {
            const container = document.getElementById('wishlist-container');
            container.innerHTML = "";

            if (wishlist.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:var(--text-soft);'>Wishlist boş! (Everything is bought! 🎉)</p>";
            } else {
                wishlist.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'wishlist-item';
                    div.innerHTML = `<div class="rank-num">${index + 1}</div><span>${item}</span>`;
                    container.appendChild(div);
                });
            }

            if (completedWishlist.length > 0) {
                const header = document.createElement('div');
                header.className = 'completed-header';
                header.innerText = "💅 Spoiled Princess Things";
                container.appendChild(header);

                const completedContainer = document.createElement('div');
                completedContainer.className = 'completed-list';

                const reversedCompleted = [...completedWishlist].reverse();
                reversedCompleted.forEach((item) => {
                    const div = document.createElement('div');
                    div.className = 'wishlist-item completed-item';
                    div.innerHTML = `<span>${item}</span>`;
                    completedContainer.appendChild(div);
                });
                container.appendChild(completedContainer);
            }
        }

        function wishlistSubmitDone() {
            const input = document.getElementById('wish-entry');
            const newItem = input.value;
            if (newItem) { wishlist.push(newItem); renderWishlist(); }
            input.value = "";
            const msg = document.getElementById('wish-success-msg');
            msg.style.display = "block";
            makeItRain('🛍️');
            setTimeout(() => { msg.style.display = "none"; }, 3000);
        }

        function updatePlaceholder() {
            const type = document.getElementById('task-type').value;
            const input = document.getElementById('task-details');
            const texts = {
                "Yemek Söyle": "Ne yiceksin? (Burger, Sushi...)",
                "Limit Arttır": "Ne kadar arttırayım? (💸)",
                "Para At": "Ne kadar atim?",
                "Essay Yaz": "Konu ne? Ne zamana?"
            };
            input.placeholder = texts[type] || "Detay yaz...";
        }

        function renderRoutine() {
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const dayName = days[new Date().getDay()];

            const emojiMap = {
                'Glutatyon': '💊', 'Glikolik asit': '🧪', 'Retinol': '🌙', 'Pirinc suyu': '🌾',
                'Yuz maskesi + Glikolik asit': '🎭', 'Serbest cilt bakimi': '🧖‍♀️', 'SPF': '☀️',
                'Yemek ye': '🥗', 'Su iç': '💧', "Ace'e foto at": '📸', 'C vit': '🍊'
            };
            const routineMap = {
                'Monday': ['Glutatyon','C vit', 'Glikolik asit'], 'Tuesday': ['Glutatyon','C vit', 'Retinol'], 'Wednesday': ['Glutatyon','C vit', 'Pirinc suyu'],
                'Thursday': ['Glutatyon','C vit', 'Retinol'], 'Friday': ['Glutatyon','C vit', 'Yuz maskesi + Glikolik asit'], 'Saturday': ['Glutatyon','C vit', 'Serbest cilt bakimi'], 'Sunday': ['Glutatyon','C vit', 'Retinol']
            };

            let dailyTasks = routineMap[dayName] || ['SPF'];
            dailyTasks = dailyTasks.concat(['Yemek ye', 'Su iç', "Ace'e foto at"]);

            const container = document.getElementById('routine-list');
            container.innerHTML = "";
            dailyTasks.forEach(item => {
                const icon = emojiMap[item] || '✨';
                const div = document.createElement('div');
                div.className = 'routine-item';
                div.innerHTML = `<span class="routine-emoji">${icon}</span> <span>${item}</span>`;
                container.appendChild(div);
            });
        }

        function makeItRain(emoji) {
            const container = document.getElementById('emoji-container');
            for(let i=0; i<10; i++) {
                const el = document.createElement('div');
                el.innerText = emoji;
                el.className = 'floating-emoji';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = (Math.random() * 20 + 80) + 'vh';
                el.style.animationDuration = (Math.random() * 1 + 1.5) + 's';
                container.appendChild(el);
                setTimeout(() => el.remove(), 2000);
            }
        }

        /* ==========  🍽️ FOOD  ========== */
        function setFoodType(type) {
            selectedFoodType = type;
            document.querySelectorAll('.food-pill').forEach(p => {
                p.classList.toggle('active', p.dataset.type === type);
            });
            const emojis = { 'All': '🍴', 'Healthy': '🥗', 'Dirty': '🍔' };
            document.getElementById('food-result').innerHTML = '';
            const plateEmoji = document.getElementById('food-plate-emoji');
            plateEmoji.innerText = emojis[type];
            plateEmoji.style.display = 'block';
            plateEmoji.style.animation = 'none';
            void plateEmoji.offsetWidth;
            plateEmoji.style.animation = 'popIn 0.4s ease';
            document.getElementById('food-img-tag').style.display = 'none';
            document.getElementById('food-link-btn').style.display = 'none';
        }

        function pickFood() {
            if (foods.length === 0) return;
            let filtered = foods;
            if (selectedFoodType === 'Healthy') {
                filtered = foods.filter(f => f.type === 'Healthy' || f.type === 'Both');
            } else if (selectedFoodType === 'Dirty') {
                filtered = foods.filter(f => f.type === 'Dirty' || f.type === 'Both');
            }
            if (filtered.length === 0) {
                document.getElementById('food-result').innerHTML = "Bu kategoride yemek yok 🥲";
                return;
            }
            const random = filtered[Math.floor(Math.random() * filtered.length)];
            document.getElementById('food-result').innerHTML = `Bunu ye: <b>${random.name}</b>`;

            const plateEmoji = document.getElementById('food-plate-emoji');
            const imgTag = document.getElementById('food-img-tag');
            if (random.img && random.img.length > 5) {
                imgTag.src = random.img;
                imgTag.style.display = 'block';
                plateEmoji.style.display = 'none';
            } else {
                plateEmoji.innerText = random.type === 'Healthy' ? '🥗' : random.type === 'Dirty' ? '🍔' : '🍴';
                plateEmoji.style.display = 'block';
                plateEmoji.style.animation = 'none';
                void plateEmoji.offsetWidth;
                plateEmoji.style.animation = 'popIn 0.4s ease';
                imgTag.style.display = 'none';
            }
            const linkBtn = document.getElementById('food-link-btn');
            if (random.link && random.link.startsWith('http')) {
                linkBtn.style.display = 'inline-block';
                linkBtn.href = random.link;
            } else {
                linkBtn.style.display = 'none';
            }
            makeItRain('🍴');
        }

        function pickMeme() {
            if (memes.length === 0) return;
            const random = memes[Math.floor(Math.random() * memes.length)];
            const div = document.getElementById('meme-result');
            if (random.startsWith('http')) div.innerHTML = `<img src="${random}">`; else div.innerText = random;
        }

        function renderWatchlist() {
            const container = document.getElementById('watchlist-container');
            if (watchlist.length === 0) { container.innerHTML = "<p style='color:var(--text-soft);'>Nothing to watch yet!</p>"; return; }
            watchlist.forEach(show => {
                const a = document.createElement('a');
                a.href = show.link; a.target = "_blank"; a.style.textDecoration = "none";
                a.innerHTML = `<button class="btn watch-btn">🎬 ${show.title}</button>`;
                container.appendChild(a);
            });
        }

        function checkWaterDate() {
            const todayStr = new Date().toDateString();
            if (localStorage.getItem('lastSipDate') !== todayStr) { localStorage.setItem('waterCount', 0); localStorage.setItem('lastSipDate', todayStr); }
            document.getElementById('water-count').innerText = localStorage.getItem('waterCount') || 0;
        }
        function addWater() {
            let count = parseInt(localStorage.getItem('waterCount') || 0);
            localStorage.setItem('waterCount', ++count); localStorage.setItem('lastSipDate', new Date().toDateString());
            document.getElementById('water-count').innerText = count;
            makeItRain('💧');
        }

        function updatePeriodCountdown() {
            const el = document.getElementById('period-countdown');
            if (!nextPeriodDate || nextPeriodDate.length < 5) { el.innerHTML = "<strong>Update Date</strong>"; return; }

            let target;
            if (nextPeriodDate.includes('-')) {
                const parts = nextPeriodDate.split('-');
                if(parts.length === 3) target = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            }
            else if (nextPeriodDate.includes('.') || nextPeriodDate.includes('/')) {
                const sep = nextPeriodDate.includes('.') ? '.' : '/';
                const parts = nextPeriodDate.split(sep);
                if(parts.length === 3) target = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
            }

            if (!target || isNaN(target.getTime())) {
                target = new Date(nextPeriodDate);
            }

            if (isNaN(target.getTime())) {
                el.innerHTML = "<strong>Invalid Date</strong>";
                console.log("Failed:", nextPeriodDate);
                return;
            }

            const daysLeft = Math.ceil((target - new Date()) / (1000 * 60 * 60 * 24));
            el.innerHTML = daysLeft < 0 ? "<strong>Late / Started</strong>" : `<strong>${daysLeft} days</strong> left`;
        }

        /* ==========  📳 HAPTICS  ========== */
        function buzz(ms) {
            if (navigator.vibrate) navigator.vibrate(ms || 8);
        }
        document.addEventListener('click', (e) => {
            if (e.target.closest('button, .btn, .theme-swatch, .food-pill, a.watch-btn')) buzz(8);
        });

        /* ==========  🌸 AMBIENT PETALS  ========== */
        const petalEmojis = ['🌸','🌺','💕','✨','🌷','💖','🦋'];
        function spawnPetal() {
            const el = document.createElement('div');
            el.className = 'ambient-petal';
            el.innerText = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
            el.style.left = (Math.random() * 95) + 'vw';
            el.style.fontSize = (Math.random() * 0.7 + 1.0) + 'rem';
            const dur = Math.random() * 6 + 9;
            el.style.animationDuration = dur + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), dur * 1000 + 500);
        }
        // Seed a few so it's not empty on load
        for (let i = 0; i < 3; i++) {
            setTimeout(spawnPetal, i * 1500);
        }
        setInterval(spawnPetal, 2200);

        /* ==========  📱 SHAKE TO PICK FOOD  ========== */
        let shakeReady = false;
        let lastShake = 0;
        function onShake(e) {
            const a = e.accelerationIncludingGravity;
            if (!a) return;
            const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
            const now = Date.now();
            if (mag > 25 && now - lastShake > 1500) {
                lastShake = now;
                buzz(30);
                pickFood();
                const card = document.querySelector('.food-card');
                if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
        async function enableShake() {
            if (shakeReady) return;
            if (typeof DeviceMotionEvent !== 'undefined' &&
                typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const p = await DeviceMotionEvent.requestPermission();
                    if (p !== 'granted') return;
                } catch (e) { return; }
            }
            window.addEventListener('devicemotion', onShake);
            shakeReady = true;
        }
        // iOS requires a user gesture; piggyback on first tap
        document.addEventListener('click', enableShake, { once: true });
        document.addEventListener('touchstart', enableShake, { once: true });

        updateGreeting();
        setInterval(rotateAce, 3500);
        checkWaterDate();
        fetchData();
        updatePlaceholder();
    </script>
</body>
</html>
